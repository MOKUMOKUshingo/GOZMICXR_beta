<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>Ocean Vibes 3D / VR / AR Scene</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="stylesheet" href="language-scene.css" />
  <link rel="stylesheet" href="project-video-safe.css" />
</head>
<body>
  <div id="app"></div>

  <div id="hud">
    <a id="backLink" href="../index.html#gallery" aria-label="Back to Ocean Vibes gallery">← Gallery</a>
    <div id="titleBlock">
      <div class="eyebrow">three.js portal</div>
      <h1>Ocean Vibes 3D / VR / AR</h1>
      <p>PC: WASD + drag. Mobile: stick + swipe. VR: press ENTER VR. AR: press START AR, scan a floor or desk, then tap to place the Ocean Vibes mini gallery.</p>
    </div>
  </div>

  <div id="projectVideoPanel" class="project-video-panel" aria-live="polite">
    <div id="projectVideoLabel" class="project-video-label">Project Movie</div>
    <div id="projectVideoStatus" class="project-video-status">Waiting for video...</div>
    <div class="project-video-actions">
      <button type="button" id="playProjectMuted">Play video</button>
      <button type="button" id="playProjectSound">Play with sound</button>
      <button type="button" id="openNativeProjectVideo" class="native-mobile-only">Mobile player</button>
      <button type="button" id="rewindProjectVideo">-10s</button>
      <button type="button" id="forwardProjectVideo">+10s</button>
      <button type="button" id="reloadProjectVideo">Retry</button>
    </div>
  </div>

  <div id="mobileControls" aria-hidden="true">
    <div id="stickBase"><div id="stickKnob"></div></div>
    <div id="mobileHint">DRAG TO LOOK</div>
  </div>

  <div id="nativeVideoOverlay" class="native-video-overlay" hidden aria-hidden="true">
    <div class="native-video-card">
      <button type="button" id="closeNativeVideo" class="native-video-close" aria-label="Close video">×</button>
      <video id="nativeProjectVideo" src="../video/projectmovie1.mp4" poster="../img/title1-poster.jpg" controls playsinline webkit-playsinline preload="metadata"></video>
      <p id="nativeVideoNote">スマホで3D内再生できない場合は、このネイティブ再生で確認できます。</p>
    </div>
  </div>

  <video id="oceanVideo" src="../video/projectmovie1.mp4" poster="../img/title1-poster.jpg" muted loop playsinline webkit-playsinline preload="metadata"></video>

  <script type="importmap">
  {
    "imports": {
      "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
      "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
    }
  }
  </script>
  <script src="language-scene.js"></script>
  <script type="module" src="main.js"></script>
</body>
</html>
